<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Task Submit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎓 Student Task Submit</h1>

    <div class="card">
      <input type="text" id="studentName" placeholder="Student name">
      <input type="text" id="taskText" placeholder="Task description">

      <button id="submitBtn">Submit Task</button>

      <p class="info">Data is saved to Firebase automatically</p>
    </div>

  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
